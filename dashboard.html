<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Live Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>ESP32 Live Sine Wave</h2>

<canvas id="chart" width="600" height="300"></canvas>

<script>

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Sine Wave',
            data: [],
            borderWidth: 2,
            fill: false,
            tension: 0.2
        }]
    },
    options: {
        animation: false,
        responsive: true,
        scales: {
            x: {
                display: false
            },
            y: {
                suggestedMin: -1,
                suggestedMax: 1
            }
        }
    }
});


// 🔥 WebSocket Connection (Render URL)
const socket = new WebSocket("wss://esp32-dashboard-f69l.onrender.com");

socket.onopen = function() {
    console.log("✅ WebSocket Connected");
};

socket.onmessage = function(event) {

    // ESP32 sends plain number
    let value = parseFloat(event.data);

    console.log("Received:", value);

    if (!isNaN(value)) {

        chart.data.labels.push('');
        chart.data.datasets[0].data.push(value);

        // Keep last 100 points
        if (chart.data.labels.length > 100) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }

        chart.update();
    }
};

socket.onclose = function() {
    console.log("❌ WebSocket Disconnected");
};

socket.onerror = function(error) {
    console.log("⚠ WebSocket Error:", error);
};

</script>

</body>
</html>
